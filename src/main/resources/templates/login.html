<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Please sign in</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#6a11cb,#2575fc);
        }

        .login-box{
            width:350px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .message{
            display:block;
            text-align:center;
            margin-bottom:15px;
            color:red;
            font-size:14px;
        }

        .form-group{
            margin-bottom:15px;
        }

        .form-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
        }

        .form-group input:focus{
            outline:none;
            border-color:#2575fc;
        }

        .remember{
            font-size:14px;
            margin-bottom:15px;
        }

        .remember input{
            margin-right:5px;
        }

        .login-btn{
            width:100%;
            padding:10px;
            background:#2575fc;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#1a5ed8;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            font-size:13px;
            color:#777;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Hãy đăng nhập trước</h2>

    <i class="message" th:text="${message}"></i>

    <form th:action="@{/login/check}" method="post">

        <div class="form-group">
            <input name="username" type="text" placeholder="admin@gmail.com">
        </div>

        <div class="form-group">
            <input name="password" type="password" placeholder="Password">
        </div>

        <div class="remember">
            <input name="remember-me" type="checkbox"> Remember me?
        </div>

        <button class="login-btn" type="submit">Sign in</button>

    </form>

    <div class="footer">
        Spring Security Login
    </div>

</div>

</body>
</html>
