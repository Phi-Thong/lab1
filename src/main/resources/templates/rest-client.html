<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Sinh Viên - Premium Interface</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
      body {
        background-color: #f4f7f6;
      }
      .container {
        max-width: 900px;
        margin-top: 50px;
      }
      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      .card-header {
        background: linear-gradient(45deg, #007bff, #00d2ff);
        color: white;
        border-radius: 15px 15px 0 0 !important;
        font-weight: bold;
        text-align: center;
        font-size: 1.5rem;
      }
      .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
      .table thead {
        background-color: #343a40;
        color: white;
      }
      .btn-action {
        padding: 5px 10px;
        font-size: 0.8rem;
      }
      .form-label {
        font-weight: 600;
        color: #495057;
      }
      /* Hiệu ứng khi di chuột qua hàng trong bảng */
      tbody tr:hover {
        background-color: #f1f1f1;
        transition: 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card mb-4">
        <div class="card-header">
          <i class="fas fa-user-graduate me-2"></i>QUẢN LÝ SINH VIÊN
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Mã sinh viên (Id)</label>
              <input
                type="text"
                id="id"
                class="form-control"
                placeholder="Ví dụ: SV001"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Họ và Tên</label>
              <input
                type="text"
                id="fullname"
                class="form-control"
                placeholder="Nhập tên đầy đủ"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Điểm trung bình</label>
              <input
                type="number"
                id="mark"
                class="form-control"
                placeholder="0.0"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label d-block">Giới tính</label>
              <div class="form-check form-check-inline mt-2">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="male"
                  value="true"
                  checked
                />
                <label class="form-check-label" for="male">Nam</label>
              </div>
              <div class="form-check form-check-inline mt-2">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="female"
                  value="false"
                />
                <label class="form-check-label" for="female">Nữ</label>
              </div>
            </div>
          </div>
          <hr />
          <div class="text-center">
            <button onclick="createStudent()" class="btn btn-success px-4">
              <i class="fas fa-plus me-1"></i> Create
            </button>
            <button onclick="updateStudent()" class="btn btn-primary px-4">
              <i class="fas fa-save me-1"></i> Update
            </button>
            <button onclick="resetForm()" class="btn btn-secondary px-4">
              <i class="fas fa-redo me-1"></i> Reset
            </button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Họ Tên</th>
                <th>Điểm</th>
                <th>Giới tính</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const host = "https://java6poly-41fd2-default-rtdb.firebaseio.com";
      let currentKey = "";

      function loadData() {
        axios.get(`${host}/students.json`).then((resp) => {
          const tbody = document.getElementById("table-body");
          tbody.innerHTML = "";
          const data = resp.data;
          for (let key in data) {
            let s = data[key];
            let row = `<tr>
                    <td class="fw-bold text-primary">${s.id}</td>
                    <td>${s.name}</td>
                    <td><span class="badge ${s.mark >= 5 ? "bg-success" : "bg-danger"}">${s.mark}</span></td>
                    <td>${s.gender ? '<i class="fas fa-mars text-info"></i> Nam' : '<i class="fas fa-venus text-danger"></i> Nữ'}</td>
                    <td class="text-center">
                        <button onclick="editStudent('${key}')" class="btn btn-outline-warning btn-action"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteByKey('${key}')" class="btn btn-outline-danger btn-action"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            tbody.innerHTML += row;
          }
        });
      }

      function createStudent() {
        const data = {
          id: document.getElementById("id").value,
          name: document.getElementById("fullname").value,
          mark: parseFloat(document.getElementById("mark").value),
          gender: document.getElementById("male").checked,
        };
        if (!data.id || !data.name) return alert("Vui lòng nhập đủ thông tin!");

        axios.post(`${host}/students.json`, data).then(() => {
          loadData();
          resetForm();
        });
      }

      function editStudent(key) {
        currentKey = key;
        axios.get(`${host}/students/${key}.json`).then((resp) => {
          const s = resp.data;
          document.getElementById("id").value = s.id;
          document.getElementById("fullname").value = s.name;
          document.getElementById("mark").value = s.mark;
          if (s.gender) document.getElementById("male").checked = true;
          else document.getElementById("female").checked = true;
          // Cuộn lên đầu trang để sửa
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      }

      function updateStudent() {
        if (!currentKey)
          return alert("Hãy chọn một sinh viên từ danh sách để sửa!");
        const data = {
          id: document.getElementById("id").value,
          name: document.getElementById("fullname").value,
          mark: parseFloat(document.getElementById("mark").value),
          gender: document.getElementById("male").checked,
        };
        axios.put(`${host}/students/${currentKey}.json`, data).then(() => {
          loadData();
          alert("Cập nhật thành công!");
        });
      }

      function deleteByKey(key) {
        if (confirm("Bạn có chắc chắn muốn xóa sinh viên này không?")) {
          axios.delete(`${host}/students/${key}.json`).then(() => {
            loadData();
          });
        }
      }

      function resetForm() {
        document.getElementById("id").value = "";
        document.getElementById("fullname").value = "";
        document.getElementById("mark").value = "";
        document.getElementById("male").checked = true;
        currentKey = "";
      }

      loadData();
    </script>
  </body>
</html>
