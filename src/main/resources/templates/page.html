<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring Security Lab</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* MENU */
        .navbar{
            background:#2575fc;
            padding:15px 40px;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-right:15px;
            font-weight:bold;
            padding:8px 12px;
            border-radius:6px;
            transition:0.3s;
        }

        .navbar a:hover{
            background:rgba(255,255,255,0.2);
        }

        /* CONTAINER */
        .container{
            width:900px;
            margin:40px auto;
        }

        /* TITLE CARD */
        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card h1{
            color:#333;
        }

        .card b{
            color:#2575fc;
        }

        /* USER INFO */
        .user-box{
            margin-top:20px;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<!-- MENU -->
<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/poly/url0}">URL0</a>
    <a th:href="@{/poly/url1}">URL1</a>
    <a th:href="@{/poly/url2}">URL2</a>
    <a th:href="@{/poly/url3}">URL3</a>
    <a th:href="@{/poly/url4}">URL4</a>
</div>

<div class="container">

    <div class="card">
        <h1>Page: <b th:text="${message}"></b></h1>
    </div>

    <div class="user-box">
        <div th:replace="~{user-info}"></div>
    </div>

</div>

</body>
</html>
